# This is a Databricks asset bundle definition for dbx_prof_exam_prep.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbx_prof_exam_prep
  uuid: bc5f31f2-3f44-4672-bb22-6567bc4c67e6

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-6484799862818441.1.azuredatabricks.net
    variables:
      catalog: dbx
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-6484799862818441.1.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/bernd.fellinghauer@data-fittery.ch to make sure we only have a single copy.
      root_path: /Workspace/Users/bernd.fellinghauer@data-fittery.ch/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbx
      schema: prod
